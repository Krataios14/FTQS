name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          pip install -e .[dev]
          pip install torch --index-url https://download.pytorch.org/whl/cpu
      - name: Test
        run: python -m pytest -q
